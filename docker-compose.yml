services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: sherlock
      POSTGRES_USER: sherlock
      POSTGRES_PASSWORD: sherlock
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      EXPLORER_ROOT: /workspace
      EXPLORER_AUTH_DISABLED: ${EXPLORER_AUTH_DISABLED:-false}
      EXPLORER_READ_API_KEY: ${EXPLORER_READ_API_KEY:-dev-read-key}
      EXPLORER_ADMIN_API_KEY: ${EXPLORER_ADMIN_API_KEY:-dev-admin-key}
      EXPLORER_ALLOWED_ORIGINS: ${EXPLORER_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DATABASE_URL: postgres://sherlock:sherlock@postgres:5432/sherlock
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./:/workspace:ro
    depends_on:
      - postgres
    ports:
      - "8787:8787"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8787}
        NEXT_PUBLIC_EXPLORER_READ_API_KEY: ${NEXT_PUBLIC_EXPLORER_READ_API_KEY:-dev-read-key}
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_EXPLORER_READ_API_KEY: ${NEXT_PUBLIC_EXPLORER_READ_API_KEY:-dev-read-key}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
