services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      EXPLORER_ROOT: /workspace
    volumes:
      - ./:/workspace:ro
    ports:
      - "8787:8787"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8787}
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped
