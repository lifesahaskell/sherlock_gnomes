name: Fuzz Suite

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend-fuzz:
    name: Backend Fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> backend/target
            backend/fuzz -> backend/fuzz/target

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked

      - name: Run semantic parser fuzz target
        working-directory: backend/fuzz
        env:
          ASAN_OPTIONS: detect_odr_violation=0:detect_leaks=0
        run: |
          cargo +nightly fuzz run parse_semantic_blocks \
            --sanitizer address \
            -- \
            -max_total_time=90 \
            -max_len=32768
