name: Hardening Nightly

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  long-fuzz:
    name: Long Fuzz Run
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> backend/target
            backend/fuzz -> backend/fuzz/target

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked

      - name: Run long semantic parser fuzz target
        working-directory: backend/fuzz
        env:
          ASAN_OPTIONS: detect_odr_violation=0:detect_leaks=0
        run: |
          cargo +nightly fuzz run parse_semantic_blocks \
            --sanitizer address \
            -- \
            -max_total_time=900 \
            -max_len=32768

  mutation-analysis:
    name: Mutation Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run targeted mutation analysis
        working-directory: backend
        run: cargo mutants --file src/indexing/chunking.rs --in-place --timeout 120

  migration-safety:
    name: Migration Safety
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: sherlock
          POSTGRES_USER: sherlock
          POSTGRES_PASSWORD: sherlock
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sherlock -d sherlock"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://sherlock:sherlock@localhost:5432/sherlock
      TEST_DATABASE_URL: postgres://sherlock:sherlock@localhost:5432/sherlock
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run migration safety test
        run: cargo test --manifest-path backend/Cargo.toml --test migrations

  perf-smoke:
    name: Performance Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PERF_SMOKE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run parser performance smoke test
        run: cargo test --manifest-path backend/Cargo.toml --test perf_smoke -- --nocapture
